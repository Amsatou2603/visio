<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c1121f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background avec coins arrondis pour PWA -->
  <rect width="100" height="100" rx="18" fill="url(#g)" filter="url(#shadow)"/>
  <!-- V plus grand et plus épais pour meilleure visibilité -->
  <text x="50" y="74" font-family="Syne, Arial Black, sans-serif" font-size="68"
    font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3"
    stroke="rgba(0,0,0,0.1)" stroke-width="1">V</text>
</svg>
