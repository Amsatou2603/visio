name: visio_mobile
description: Visio mobile app (Flutter) - skeleton
publish_to: "none"
version: 0.0.1
environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^1.6.0
  shared_preferences: ^2.1.1
  url_launcher: ^6.1.10
  provider: ^6.0.5
  google_fonts: ^6.1.0
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.2.16

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: '#B71C1C'
  adaptive_icon_foreground: assets/images/logo.png

flutter_native_splash:
  color: '#B71C1C'
  image: assets/images/logo_splash.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
